{% extends "en-us/SpineDoc.htm" -%}
    {% block htmMetaPageLayout -%}
    {{ super() }}
    <meta name="result.pageId" content="{{ result.shortFileName }}" />
    <meta name="result.javaType" content="class" />
    <meta name="result.commentVar" content="Description" />
    <meta name="result.javaClass" content="String" />
    <meta name="result.sinceVersion" content="3" />
    <meta name="result.supportStatus" content="stable" />
    <meta name="result.copyCode" content="{{ result.commentVar }}: " />
    <meta name="result.exampleClassSimpleName" content="FishPopulation" />
    <meta name="result.exampleClassGenericSimpleName" content="BaseModel" />
    <meta name="result.exampleValue" content="{{ exampleValue | default('Tracking fish population counts, maturation, and incubation over time. ', true) }}" />
    <meta name="result.exampleCode" content="{{ result.copyCode }}{{ result.exampleValue }}" />
    <meta name="result.name" content="Class {{ result.commentVar }} comment" />
    <meta name="result.description" content="Adds a description for the given data model in one or more languages." />
    {% endblock htmMetaPageLayout -%}
