{% extends "en-us/SpineDoc.htm" -%}
    {% block htmMetaPageLayout -%}
    {{ super() }}
    <meta name="result.pageId" content="{{ result.shortFileName }}" />
    <meta name="result.javaType" content="class" />
    <meta name="result.commentVar" content="ApiMethod" />
    <meta name="result.javaClass" content="Boolean" />
    <meta name="result.sinceVersion" content="3" />
    <meta name="result.supportStatus" content="stable" />
    <meta name="result.copyCode" content="{{ result.commentVar }}:
{{ result.exampleValue }}" />
    <meta name="result.exampleValue" content="{{ exampleValue | default('  Search:
  GET:
  PATCH:
  POST:
  DELETE:', true) }}" />
    <meta name="result.exampleCode" content="{{ result.copyCode }}" />
    <meta name="result.name" content="Class ApiMethod comment" />
    <meta name="result.description" content="Generate a Java REST API and OpenAPI spec for the given ApiMethods of the Java Class." />
    {% endblock htmMetaPageLayout -%}
          {% block htmBodyMiddleArticle -%}
          <div class="content-padding-inline wa-stack ">
            <h2>
              Description
            </h2>
            <p>
              This class contains a comment <kbd><b>ApiMethod: %s</b></kbd>, which creates an API "%s". 
            </p>

            
          </div>
          {% endblock %}
